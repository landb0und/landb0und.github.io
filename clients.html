<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #0a0806; --bg-2: #14100c; --bg-3: #1a1410;
    --ink: #e8ddc5; --ink-2: #c9b88f; --ink-3: #968266; --ink-4: #5a4d3a;
    --amber: #f5b042; --rose: #e8589a; --leaf: #6fbd5f;
    --line: rgba(245,176,66,0.14); --line-2: rgba(245,176,66,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: -apple-system, system-ui, sans-serif; min-height: 100%; }
  body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 999; background-image: repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,255,255,0.012) 2px 3px); }

  .nav { position: fixed; top: 0; left: 0; bottom: 0; width: 220px; background: var(--bg-2); border-right: 1px solid var(--line); padding: 24px 0; z-index: 20; display: flex; flex-direction: column; }
  .nav-brand { padding: 0 22px 22px; border-bottom: 1px solid var(--line-2); margin-bottom: 18px; }
  .nav-brand .logo { font-size: 15px; font-weight: 900; letter-spacing: 0.04em; color: var(--amber); }
  .nav-brand .tag { font-size: 9px; color: var(--ink-4); letter-spacing: 0.22em; font-family: 'SF Mono', Menlo, monospace; text-transform: uppercase; margin-top: 6px; }
  .nav-items { display: flex; flex-direction: column; gap: 2px; padding: 0 10px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 6px; font-size: 12px; color: var(--ink-2); cursor: pointer; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; font-family: 'SF Mono', Menlo, monospace; text-decoration: none; }
  .nav-item:hover { background: rgba(255,255,255,0.03); color: var(--ink); }
  .nav-item.active { background: rgba(245,176,66,0.12); color: var(--amber); }
  .nav-socials { margin: 22px 14px 0; padding: 16px 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--line-2); border-radius: 8px; }
  .nav-socials-h { font-size: 9px; color: var(--amber); letter-spacing: 0.22em; text-transform: uppercase; font-weight: 700; font-family: 'SF Mono', Menlo, monospace; margin-bottom: 10px; }
  .nav-soc { display: flex; align-items: center; gap: 10px; padding: 6px 0; cursor: pointer; text-decoration: none; }
  .nav-soc:not(:last-child) { border-bottom: 1px solid var(--line-2); }
  .nav-soc-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px; flex-shrink: 0; }
  .nav-soc-icon svg { width: 16px; height: 16px; }
  .nav-soc-icon.tt { background: linear-gradient(135deg, var(--rose), #25f4ee); color: #000; }
  .nav-soc-icon.tt svg { color: #000; }
  .nav-soc-icon.ig { background: linear-gradient(135deg, var(--amber), var(--rose), #c084fc); color: #fff; }
  .nav-soc-icon.ig svg { color: #fff; }
  .nav-soc-icon.li { background: #0a66c2; color: #fff; font-size: 11px; }
  .nav-soc-icon.li svg { color: #fff; }
  .nav-soc-icon.im { background: #f5c518; color: #000; font-size: 10px; }
  .nav-soc-info { flex: 1; min-width: 0; }
  .nav-soc-h { font-size: 11px; color: var(--ink); font-weight: 700; line-height: 1.1; }
  .nav-soc-m { font-size: 9px; color: var(--ink-4); font-family: 'SF Mono', Menlo, monospace; letter-spacing: 0.06em; margin-top: 1px; }
  .nav-bottom { margin-top: auto; padding: 20px 22px 0; font-size: 10px; color: var(--ink-4); line-height: 1.6; font-family: 'SF Mono', Menlo, monospace; letter-spacing: 0.06em; }
  .nav-bottom .status { display: flex; align-items: center; gap: 6px; color: var(--leaf); margin-bottom: 4px; }
  .nav-bottom .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--leaf); animation: pulse 1.8s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }

  .main { margin-left: 220px; padding: 32px 40px 60px; max-width: 1280px; position: relative; z-index: 2; }

  /* Page head */
  .ph { margin-bottom: 36px; padding-bottom: 22px; border-bottom: 1px solid var(--line-2); display: flex; align-items: baseline; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
  .ph-l h1 { font-size: 56px; font-weight: 900; letter-spacing: -0.03em; line-height: 0.95; }
  .ph-l p { font-size: 13px; color: var(--ink-3); font-family: Georgia, serif; font-style: italic; margin-top: 8px; max-width: 540px; }
  .ph-r { font-size: 10px; color: var(--ink-4); letter-spacing: 0.22em; font-family: 'SF Mono', Menlo, monospace; text-transform: uppercase; text-align: right; }
  .ph-r strong { color: var(--amber); font-weight: 800; }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 800px)  { .grid { grid-template-columns: repeat(2, 1fr); } }

  .card { background: var(--bg-2); border: 1px solid var(--line-2); border-radius: 10px; padding: 18px; text-decoration: none; color: inherit; transition: all .15s; display: flex; flex-direction: column; gap: 14px; }
  .card:hover { border-color: var(--amber); transform: translateY(-2px); background: var(--bg-3); }

  .card-head { display: flex; gap: 12px; align-items: center; }
  .av-ring { width: 56px; height: 56px; border-radius: 50%; padding: 2px; background: linear-gradient(45deg, var(--amber), var(--rose)); flex-shrink: 0; }
  .av-inner { width: 100%; height: 100%; border-radius: 50%; background: var(--bg); padding: 2px; }
  .av-img { width: 100%; height: 100%; border-radius: 50%; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-size: 16px; }
  .sa-1 { background: linear-gradient(135deg, #f5b042, #e8589a); }
  .sa-2 { background: linear-gradient(135deg, #6b3a1a, #c084fc); }
  .sa-3 { background: linear-gradient(135deg, #4a1838, #f5b042); }
  .sa-4 { background: linear-gradient(135deg, #2a4a18, #6fbd5f); }
  .sa-5 { background: linear-gradient(135deg, #f5b042, #c4533a); }
  .sa-6 { background: linear-gradient(135deg, #2a1f15, #f5b042); }
  .sa-7 { background: linear-gradient(135deg, #1f2a18, #6fbd5f); }
  .sa-8 { background: linear-gradient(135deg, #5a2a10, #c4533a); }
  .sa-9 { background: linear-gradient(135deg, #6b3a1a, #c0aa70); }
  .sa-10 { background: linear-gradient(135deg, #1a0a18, #e8589a); }
  /* Laurie Anderson easter egg — a pure black void where a face should be. */
  .sa-black { background: #000; color: #000; }

  .card-id { flex: 1; min-width: 0; }
  .card-name { font-size: 14px; color: var(--ink); font-weight: 800; letter-spacing: -0.01em; line-height: 1.15; }
  .card-handle { font-size: 11px; color: var(--ink-3); font-family: 'SF Mono', Menlo, monospace; margin-top: 3px; letter-spacing: 0.04em; }
  .card-role { font-size: 11px; color: var(--amber); font-family: 'SF Mono', Menlo, monospace; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; line-height: 1.4; }
  .card-blurb { font-size: 12px; color: var(--ink-2); line-height: 1.45; }
  .card-meta { font-size: 9px; color: var(--ink-4); letter-spacing: 0.18em; font-family: 'SF Mono', Menlo, monospace; text-transform: uppercase; margin-top: auto; padding-top: 12px; border-top: 1px solid var(--line-2); display: flex; gap: 14px; }
  .card-meta strong { color: var(--ink-3); font-weight: 700; }
</style>

<main class="main">

<script src="data.js?v=4"></script>
<script>
  function render() {
    const grid = document.getElementById('clientGrid');
    const counter = document.getElementById('ph-r');
    if (!grid || !window.CLIENTS) return;
    const clients = window.CLIENTS;
    counter.innerHTML = '<strong>' + clients.length + '</strong> clients<br>2022 — present';
    grid.innerHTML = clients.map(c => {
      let t = window.clientThumb(c);
      // Animated Bunny preview.webp avatars arrive letterboxed and never fill the
      // circle (cover can't crop baked-in bars). Drop them so those cards fall back
      // to the clean palette + initials instead. Applies uniformly to any webp avatar.
      if (t && /\.webp(\?|$)/i.test(t)) t = null;
      const initials = window.clientInitials(c);
      const avatarBg = t ? 'style="background-image: url(\'' + t + '\');"' : '';
      const handle = c.handle || '';
      const videoCount = (c.media || []).filter(m => m.type === 'video').length;
      const photoCount = (c.media || []).filter(m => m.type === 'photo').length;
      const stats = [];
      if (videoCount) stats.push('<span><strong>' + videoCount + '</strong> ' + (videoCount === 1 ? 'video' : 'videos') + '</span>');
      if (photoCount) stats.push('<span><strong>' + photoCount + '</strong> ' + (photoCount === 1 ? 'photo' : 'photos') + '</span>');
      if (c.egg) stats.push('<span>▶ Try it now</span>');
      else if (!stats.length) stats.push('<span>Coming soon</span>');
      return ''
        + '<a class="card" href="' + (c.href || ('client.html?id=' + c.id)) + '">'
        +   '<div class="card-head">'
        +     '<div class="av-ring"><div class="av-inner"><div class="av-img ' + (t ? '' : c.palette) + '" ' + avatarBg + '>' + (t ? '' : initials) + '</div></div></div>'
        +     '<div class="card-id"><div class="card-name">' + c.name + '</div><div class="card-handle">' + handle + '</div></div>'
        +   '</div>'
        +   '<div class="card-role">' + (c.role || '') + '</div>'
        +   '<div class="card-blurb">' + (c.blurb || '') + '</div>'
        +   '<div class="card-meta">' + stats.join('') + '</div>'
        + '</a>';
    }).join('');
  }
  render();
</script>
